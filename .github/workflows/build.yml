name: Build Custom Keyboard

on:
  push:
    branches: [ "master", "main" ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build the Keyboard Extension
        run: |
          # Use -skipPackagePluginValidation to stop it from choking on metadata processors
          # Build only the target, no dependencies resolution if possible
          xcodebuild build \
            -workspace *.xcworkspace \
            -scheme Keyboard \
            -sdk iphoneos \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            -skipPackagePluginValidation \
            -derivedDataPath build
          
          mkdir -p Payload
          find build -name "*.appex" -exec cp -r {} Payload/ \;
          zip -r CustomKeyboard.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: CustomKeyboardApp
          path: CustomKeyboard.ipa