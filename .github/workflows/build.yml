- name: Build the App (Unsigned)
  run: |
    cd Demo
    rm -rf build  # Clear derived data
    xcodebuild clean \
      -project Demo.xcodeproj \
      -scheme Demo \
      -sdk iphoneos \
      -configuration Release
    xcodebuild build \
      -project Demo.xcodeproj \
      -scheme Demo \
      -sdk iphoneos \
      -configuration Release \
      CODE_SIGN_IDENTITY="" \
      CODE_SIGNING_REQUIRED=NO \
      CODE_SIGNING_ALLOWED=NO \
      -derivedDataPath build
    
    mkdir -p Payload
    cp -r build/Build/Products/Release-iphoneos/*.app Payload/
    zip -r CustomKeyboard.ipa Payload