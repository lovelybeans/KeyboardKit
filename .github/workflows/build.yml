name: Build Custom Keyboard

on:
  push:
    branches: [ "master", "main" ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build the Keyboard Extension
        run: |
          cd Demo
          # We use -workspace instead of -project. 
          # This forces Xcode to respect all the internal framework links.
          xcodebuild build \
            -workspace Demo.xcworkspace \
            -scheme Keyboard \
            -sdk iphoneos \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            -derivedDataPath build
          
          mkdir -p Payload
          # Locate the compiled keyboard extension and package it
          find build -name "*.appex" -exec cp -r {} Payload/ \;
          zip -r CustomKeyboard.ipa Payload

      - name: Upload IPA for Download
        uses: actions/upload-artifact@v4
        with:
          name: CustomKeyboardApp
          path: Demo/CustomKeyboard.ipa