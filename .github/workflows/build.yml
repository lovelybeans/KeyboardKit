name: Build Custom Keyboard

on:
  push:
    branches: [ "master", "main" ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Resolve Dependencies
        run: |
          cd Demo
          xcodebuild -resolvePackageDependencies -project Demo.xcodeproj -scheme Keyboard

      - name: Build the Keyboard Extension
        run: |
          cd Demo
          xcodebuild build \
            -project Demo.xcodeproj \
            -scheme Keyboard \
            -sdk iphoneos \
            -configuration Release \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            -derivedDataPath build
          
          mkdir -p Payload
          # Moves the compiled keyboard extension into the payload folder
          cp -r build/Build/Products/Release-iphoneos/*.appex Payload/
          zip -r CustomKeyboard.ipa Payload

      - name: Upload IPA for Download
        uses: actions/upload-artifact@v4
        with:
          name: CustomKeyboardApp
          path: Demo/CustomKeyboard.ipa