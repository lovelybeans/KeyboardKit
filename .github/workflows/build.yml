name: Build Custom Keyboard

on:
  push:
    branches: [ "master", "main" ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Locate Workspace and Build
        run: |
          # Dynamically find the .xcworkspace file
          WORKSPACE=$(find . -name "*.xcworkspace" | head -n 1)
          
          if [ -z "$WORKSPACE" ]; then
            echo "Error: No .xcworkspace found."
            exit 1
          fi
          
          echo "Building workspace: $WORKSPACE"
          
          xcodebuild build \
            -workspace "$WORKSPACE" \
            -scheme Keyboard \
            -sdk iphoneos \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            -derivedDataPath build
          
          mkdir -p Payload
          find build -name "*.appex" -exec cp -r {} Payload/ \;
          zip -r CustomKeyboard.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: CustomKeyboardApp
          path: CustomKeyboard.ipa